<div class="">
  <nav
    [class.navbar-shadow]="hasShadow"
    class="fixed top-0 left-0 w-full bg-yellow-primary border-b border-brown-dark h-20 z-[20000] relative"
  >
    <div class="flex items-center justify-between h-full px-4 md:px-8">
      <!-- ==================== MOBILE ==================== -->
      <div class="flex lg:hidden items-center justify-between w-full h-full relative">
        <!-- Logo -->
        <a routerLink="/" class="flex items-center h-full animate-clickable">
          <img
            src="assets/logos/Testo.png"
            alt="Fake Restaurant"
            class="h-full max-h-[3.5rem] object-contain transition-transform duration-300 ease-in-out"
          />
        </a>

        <!-- Stato autenticazione -->
        @if (!vm.state().isLoggedIn) {
          <!-- Se NON loggato -->
          <button
            type="button"
            class="bg-brown-dark text-yellow-primary font-medium rounded-lg text-base px-4 py-2 hover:bg-orange-soft transition"
            (click)="openLogin()"
          >
            Accedi
          </button>
        } @else {
          <!-- Se loggato -->
          <div class="flex items-center space-x-3">
            <!-- Notifiche -->
            <app-notification-dropdown (openDropdown)="vm.closeMenu()"></app-notification-dropdown>

            <!-- HAMBURGER -->
            <button
              class="flex flex-col justify-between w-6 h-5 focus:outline-none group hamburger-btn"
              (click)="vm.toggleMenu()"
            >
              <span class="block h-0.5 bg-brown-dark group-hover:bg-orange-soft transition"></span>
              <span class="block h-0.5 bg-brown-dark group-hover:bg-orange-soft transition"></span>
              <span class="block h-0.5 bg-brown-dark group-hover:bg-orange-soft transition"></span>
            </button>
          </div>

          <!-- MENU MOBILE -->
          @if (vm.state().menuOpen) {
            <div
              class="absolute top-20 right-4 bg-yellow-primary border border-brown-dark 
                rounded-lg shadow-md py-2 w-52 animate-slideIn mobile-menu"
            >
              <button
                type="button"
                (click)="vm.closeMenu(); showAddRestaurantModal = true"
                class="block px-5 py-2 w-full text-brown-dark text-left font-medium hover:bg-orange-soft transition"
              >
                Nuovo ristorante
              </button>
              <a
                routerLink="/profile"
                (click)="vm.closeMenu()"
                class="block px-5 py-2 text-brown-dark font-medium hover:bg-orange-soft transition"
              >
                Il mio profilo
              </a>
              <button
                (click)="onLogout()"
                class="flex items-center gap-3 w-full px-5 py-2 text-red-accent font-medium 
                  hover:bg-red-accent hover:text-white-background transition rounded-b-lg"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-5 h-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6A2.25 2.25 0 005.25 5.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12"
                  />
                </svg>
                Logout
              </button>
            </div>
          }
        }
      </div>

      <!-- ==================== DESKTOP ==================== -->
      <div class="hidden lg:flex items-center justify-between w-full h-full relative">
        <!-- Logo -->
        <div class="flex items-center h-full shrink-0">
          <img
            src="assets/logos/Logo.png"
            alt="Logo"
            class="h-full max-h-[4rem] object-contain select-none"
            draggable="false"
          />
        </div>

        <!-- Testo centrale -->
        <div class="absolute left-1/2 transform -translate-x-1/2 flex items-center h-full">
          <a routerLink="/" class="flex items-center justify-center h-full animate-clickable">
            <img
              src="assets/logos/Testo.png"
              alt="Fake Restaurant"
              class="h-full max-h-[3.8rem] object-contain transition-transform duration-300 ease-in-out"
            />
          </a>
        </div>

        <!-- Destra -->
        <div class="flex items-center h-full justify-end shrink-0 space-x-6">
          <!-- Se NON loggato -->
          @if (!vm.state().isLoggedIn) {
            <button
              type="button"
              class="bg-brown-dark text-yellow-primary font-medium rounded-lg text-base px-5 py-2 hover:bg-orange-soft transition"
              (click)="openLogin()"
            >
              Accedi
            </button>
          }

          <!-- Se loggato -->
          @if (vm.state().isLoggedIn) {
            <button
              type="button"
              (click)="showAddRestaurantModal = true"
              class="text-brown-dark font-medium hover:text-orange-soft transition"
            >
              Nuovo ristorante
            </button>

            <app-notification-dropdown></app-notification-dropdown>

            <a
              routerLink="/profile"
              class="text-brown-dark font-medium hover:text-orange-soft transition">
              Il mio profilo
            </a>

            <!-- LOGOUT DESKTOP -->
            <button
              (click)="onLogout()"
              class="flex flex-col items-center justify-center group"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-6 h-6 text-brown-dark group-hover:text-red-accent transition"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6A2.25 2.25 0 005.25 5.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12"
                />
              </svg>
              <span class="text-xs text-brown-dark group-hover:text-red-accent font-medium mt-1">
                Logout
              </span>
            </button>
          }
        </div>
      </div>
    </div>
  </nav>

  <!-- ============================
       MODALE AGGIUNGI RISTORANTE
       ============================ -->
  @if (showAddRestaurantModal) {
    <app-add-restaurant-modal
      (close)="showAddRestaurantModal = false"
      (save)="onCreateRestaurant($event)"
    />
  }
</div>
