<div class="w-full min-h-screen bg-white-background px-4 py-6 flex justify-center">
  <div class="w-full max-w-6xl lg:max-w-7xl 2xl:max-w-8xl md:px-6">
    <!-- TITOLO -->
    <h1 class="text-xl sm:text-2xl font-bold text-brown-dark mb-6">
      {{ title }}
    </h1>

    <!-- Caricamento -->
    @if (vm.loading()) {
      <p class="text-brown-dark/70">Caricamento...</p>
    }
    <!-- Errore -->
    @if (vm.error()) {
      <p class="text-red-accent font-semibold">{{ vm.error() }}</p>
    }
    <!-- Nessun risultato -->
    @if (!vm.loading() && vm.results().length === 0 && !vm.error()) {
      <p class="text-brown-dark/60">Nessun ristorante trovato.</p>
    }
    <!-- Lista risultati -->
    <div class="flex flex-col gap-6 place-items-center">
      @for (r of vm.results(); track r.id) {
        <app-restaurant-card class="w-full max-w-3xl" [data]="r" />
      }
    </div>
  </div>
</div>
