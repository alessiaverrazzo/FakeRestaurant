<!-- Overlay scuro -->
<div
  class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 
    animate-fadeIn overflow-y-auto"
  (click)="close.emit()"
>
  <!-- Box modale -->
  <div
    class="relative bg-white-background rounded-2xl shadow-xl p-8 w-[90%] max-w-sm 
      max-h-[90vh] overflow-y-auto border border-brown-dark animate-scaleIn"
    (click)="$event.stopPropagation()"
  >
    <!-- Tasto X -->
    <button
      class="absolute top-3 right-3 text-3xl font-bold text-brown-dark 
        hover:text-red-accent transition cursor-pointer leading-none p-1"
      (click)="closeModal()"
      aria-label="Chiudi"
    >
      ×
    </button>

    <!-- Logo + Titolo -->
    <div class="sm:mx-auto sm:w-full sm:max-w-sm">
      <img
        src="assets/logos/Testo.png"
        alt="FakeRestaurant"
        class="mx-auto h-14 w-auto"
      />
      <h2 class="mt-6 text-center text-brown-dark text-2xl font-bold tracking-tight">
        Recupera Password
      </h2>
    </div>

    <!-- Messaggio di errore -->
    @if (vm.errorMessage()) {
      <div
        class="mt-4 mb-2 w-full bg-red-accent/15 text-red-accent border border-red-accent/40 
          rounded-md px-4 py-2 text-sm font-medium animate-shake"
      >
        {{ vm.errorMessage() }}
      </div>
    }

    <!-- Messaggio di successo -->
    @if (vm.successMessage()) {
      <div
        class="mt-4 mb-2 w-full bg-green-accent/15 text-green-accent border border-green-accent/40 
          rounded-md px-4 py-2 text-sm font-medium"
      >
        {{ vm.successMessage() }}
      </div>
    }

    <!-- Form -->
    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-sm">
      @if (!vm.successMessage()) {
        <form #resetForm="ngForm" class="space-y-6" (ngSubmit)="handleSubmit(resetForm)">
          <!-- Email -->
          <div>
            <label class="block text-sm font-medium text-brown-dark">
              Inserisci la tua email
            </label>
            <div class="mt-2">
              <input
                [(ngModel)]="email"
                (ngModelChange)="onInputChange()"
                name="email"
                required
                email
                #emailField="ngModel"
                class="block w-full rounded-md border border-brown-dark px-3 py-2 
                  text-brown-dark placeholder-gray-400 shadow-sm 
                  focus:outline-none focus:ring-2 focus:ring-yellow-primary"
                placeholder="esempio@mail.com"
              />
            </div>
            
            @if (emailField.invalid && emailField.touched) {
              <p class="text-red-accent text-sm mt-1">
                Inserisci una email valida
              </p>
            }
          </div>

          <!-- Bottone invia -->
          <button
            type="submit"
            class="flex w-full justify-center rounded-md bg-brown-dark px-3 py-2
              text-sm font-semibold text-yellow-primary hover:bg-orange-soft
              transition disabled:bg-gray-300"
            [disabled]="resetForm.invalid || vm.loading()"
          >
            {{ vm.loading() ? 'Invio...' : 'Invia link di reset' }}
          </button>
        </form>
      }
    </div>
  </div>
</div>
