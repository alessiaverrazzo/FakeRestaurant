<!-- Overlay scuro -->
<div
  class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center 
    justify-center z-50 animate-fadeIn overflow-y-auto"
  (click)="close.emit()"
>
  <!-- Box modale -->
  <div
    class="relative bg-white-background rounded-2xl shadow-xl p-8 w-[90%] max-w-sm 
        max-h-[90vh] overflow-y-auto border border-brown-dark animate-scaleIn"
    (click)="$event.stopPropagation()"
  >
    <!-- Tasto X per chiudere -->
    <button
      class="absolute top-3 right-3 text-3xl font-bold text-brown-dark 
              hover:text-red-accent transition cursor-pointer leading-none p-1"
      (click)="close.emit()"
      aria-label="Chiudi"
    >
      ×
    </button>

    <!-- Logo + titolo -->
    <div class="sm:mx-auto sm:w-full sm:max-w-sm">
      <img
        src="assets/logos/Testo.png"
        alt="FakeRestaurant"
        class="mx-auto h-14 w-auto"
      />
      
      <h2 class="mt-6 text-center text-brown-dark text-2xl font-bold tracking-tight text-brown-dark">
        Accedi al tuo account
      </h2>
    </div>

    <!-- Messaggio di errore -->
    @if (vm.errorMessage()) {
      <div
        class="mt-4 mb-2 w-full bg-red-accent/15 text-red-accent border border-red-accent/40 
          rounded-md px-4 py-2 text-sm font-medium animate-shake"
      >
        {{ vm.errorMessage() }}
      </div>
    }

    <!-- Form -->
    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-sm">
      <form #loginForm="ngForm" class="space-y-6" (ngSubmit)="handleLogin()">
        <!-- Username / Email -->
        <div>
          <label class="block text-sm font-medium text-brown-dark">
            Username o Email
          </label>
          <div class="mt-2">
            <input
              [(ngModel)]="identifier"
              (ngModelChange)="onInputChange()"
              name="identifier"
              required
              #identifierField="ngModel"
              class="block w-full rounded-md border border-brown-dark px-3 py-2 
                text-brown-dark placeholder-gray-400 shadow-sm focus:outline-none focus:ring-2 focus:ring-yellow-primary"
            />
          </div>

          @if (identifierField.invalid && identifierField.touched) {
            <p class="text-red-accent text-sm mt-1">
              Campo obbligatorio
            </p>
          }
        </div>

        <!-- Password -->
        <div>
          <div class="flex items-center justify-between">
            <label class="block text-sm font-medium text-brown-dark">Password</label>
            <span
              class="text-sm font-semibold text-brown-dark hover:text-orange-soft transition cursor-pointer"
              (click)="openPasswordResetRequest.emit();"
            >
              Password dimenticata?
            </span>
          </div>
          <div class="mt-2">
            <input
              [(ngModel)]="password"
              (ngModelChange)="onInputChange()"
              name="password"
              type="password"
              required
              #passwordField="ngModel"
              class="block w-full rounded-md border border-brown-dark px-3 py-2 
                text-brown-dark placeholder-gray-400 shadow-sm focus:outline-none focus:ring-2 focus:ring-yellow-primary"
            />
          </div>
          
          @if (passwordField.invalid && passwordField.touched) {
            <p class="text-red-accent text-sm mt-1">
              Campo obbligatorio
            </p>
          }
        </div>

        <!-- Bottone accedi -->
        <button
          type="submit"
          class="flex w-full justify-center rounded-md bg-brown-dark px-3 py-2 
            text-sm font-semibold text-yellow-primary hover:bg-orange-soft transition disabled:bg-gray-300"
          [disabled]="loginForm.invalid || vm.loading()"
        >
          {{ vm.loading() ? 'Accesso...' : 'Accedi' }}
        </button>
      </form>

      <!-- Link registrati -->
      <p class="mt-8 text-center text-sm text-brown-dark">
        Non sei ancora registrato?
        <span
          class="font-bold text-brown-dark hover:text-orange-soft cursor-pointer transition"
          (click)="openRegister.emit()"
        >
          Registrati
        </span>
      </p>
    </div>
  </div>
</div>
